<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
  <title>Soterios System Tools</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="status-rail" id="statusRail" data-level="ok"></div>

      <div class="brand">
        <div class="brand-mark"><span class="dot"></span>SOTERIOS</div>
        <div class="brand-sub">System Tools</div>
      </div>

      <nav class="nav">
        <div class="nav-group-label">Overview</div>
        <div class="nav-item active" data-page="dashboard">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
          Dashboard
        </div>
        <div class="nav-item" data-page="actions">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 7 2 2 4-4M3 17l2 2 4-4M11 7h10M11 17h10"/></svg>
          Action Center
        </div>

        <div class="nav-group-label">Security</div>
        <div class="nav-item" data-page="scanner">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          File Scanner
        </div>
        <div class="nav-item" data-page="passwords">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.5 7.5a4 4 0 1 1-5.6 5.6 4 4 0 0 1 5.6-5.6Zm0 0L16 7m0 0 3 3m-3-3-2.5 2.5"/></svg>
          Passwords
        </div>
        <div class="nav-item" data-page="quarantine">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="4" rx="1"/><path d="M5 8v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8M10 13h4"/></svg>
          Quarantine
        </div>

        <div class="nav-group-label">System</div>
        <div class="nav-item" data-page="monitor">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h4l2-8 4 16 2-8h6"/></svg>
          System Monitor
        </div>
        <div class="nav-item" data-page="processes">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>

        <div class="nav-item" data-page="scripts">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
          Scripts
        </div>
        <div class="nav-item" data-page="tools">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a4 4 0 0 1-5.4 5.4L4 17l3 3 5.3-5.3a4 4 0 0 1 5.4-5.4l-3-3Z"/></svg>
          All Tools

  <script src="../js/state.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/pages/dashboard.js"></script>
  <script src="../js/pages/actionCenter.js"></script>
  <script src="../js/pages/scanner.js"></script>
  <script src="../js/pages/passwords.js"></script>
  <script src="../js/pages/quarantine.js"></script>
  <script src="../js/pages/monitor.js"></script>
  <script src="../js/pages/processes.js"></script>
  <script src="../js/pages/scripts.js"></script>
  <script src="../js/pages/tools.js"></script>
  <script src="../js/pages/settings.js"></script>
  <script src="../js/router.js"></script>

</html>
