name: Sync Wiki

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync to Wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # Clone wiki repo
          git clone https://x-access-token:${GH_TOKEN}@github.com/chrisriv10/Soterios.wiki.git wiki-repo
          cd wiki-repo
          
          # Copy all wiki files
          cp -r ../docs/wiki/* .
          
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Commit and push if there are changes
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "docs(wiki): auto-sync from docs/wiki"
            git push
          else
            echo "No changes to sync"
          fi