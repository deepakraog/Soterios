<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; img-src 'self'; script-src 'unsafe-inline';" />
  <title>Soterios</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0B0E14;
      color: #e6eaf0;
      font-family: 'Segoe UI', -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
    }

    .splash-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 36px 48px;
      background: rgba(20, 26, 33, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    .mark {
      width: 150px;
      height: 150px;
      transform: scale(4);
      margin-top: 100px;
      border-radius: 0px;
      object-fit: contain;
      animation: pulse 1.8s ease-in-out infinite;
    }

    .wordmark {
      height: 128px;
      width: auto;
      opacity: 0.97;
      margin-top: 20px;
    }

    .loading-bar {
      width: 240px;
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
      margin-top: -62px;
    }

    .loading-bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 2px;
      background: #4169E1;
      transition: width 0.35s ease;
    }

    .loading-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.55);
      margin-top: -20px;
      text-align: center;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(2.75);
      }

      50% {
        opacity: 0.75;
        transform: scale(2.5);
      }
    }
  </style>
</head>

<body>
  <div class="splash-card">
    <img class="mark" src="../../../assets/toast-icon.png" alt="Soterios" />
    <img class="wordmark" src="../../../assets/toast-wordmark.png" alt="Soterios" />
    <div class="loading-bar">
      <div class="loading-bar-fill" id="progressFill"></div>
    </div>
    <div class="loading-label" id="progressLabel">Starting Soterios...</div>
  </div>
  <script>
    (function () {
      var fill = document.getElementById('progressFill');
      var label = document.getElementById('progressLabel');

      if (window.api && window.api.on) {
        window.api.on('splash:progress', function (data) {
          if (data.pct !== undefined && fill) {
            fill.style.width = Math.min(100, Math.max(0, data.pct)) + '%';
          }
          if (data.label && label) {
            label.textContent = data.label;
          }
        });
      }
    })();
  </script>
</body>

</html>
