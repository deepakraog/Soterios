<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; img-src 'self'; script-src 'unsafe-inline';" />
  <title>Soterios</title>
  <style>
    :root {
      --splash-bg: #0B0E14;
      --splash-card: rgba(20, 26, 33, 0.95);
      --splash-border: rgba(255, 255, 255, 0.06);
      --splash-text: #e6eaf0;
      --splash-muted: rgba(255, 255, 255, 0.55);
      --splash-bar: rgba(255, 255, 255, 0.08);
      --splash-fill: #4169E1;
    }

    html[data-theme="light"] {
      --splash-bg: #f5f7fb;
      --splash-card: rgba(255, 255, 255, 0.92);
      --splash-border: rgba(15, 23, 42, 0.1);
      --splash-text: #0f172a;
      --splash-muted: rgba(71, 85, 105, 0.9);
      --splash-bar: rgba(15, 23, 42, 0.08);
      --splash-fill: #2563eb;
    }
    html[data-theme="ocean"] {
      --splash-bg: #081727;
      --splash-card: rgba(8, 30, 48, 0.95);
      --splash-border: rgba(125, 211, 252, 0.16);
      --splash-text: #ecfeff;
      --splash-muted: rgba(125, 211, 252, 0.75);
      --splash-fill: #2dd4bf;
    }
    html[data-theme="emerald"] {
      --splash-bg: #0c3024;
      --splash-card: rgba(12, 48, 36, 0.95);
      --splash-border: rgba(134, 239, 172, 0.28);
      --splash-text: #eafff0;
      --splash-muted: rgba(159, 245, 191, 0.8);
      --splash-fill: #32e06f;
    }
    html[data-theme="sunset"] {
      --splash-bg: #1c1214;
      --splash-card: rgba(46, 24, 27, 0.95);
      --splash-border: rgba(251, 191, 36, 0.16);
      --splash-text: #fff7ed;
      --splash-muted: rgba(253, 186, 116, 0.8);
      --splash-fill: #f97316;
    }
    html[data-theme="violet"] {
      --splash-bg: #231836;
      --splash-card: rgba(35, 24, 54, 0.95);
      --splash-border: rgba(192, 132, 252, 0.18);
      --splash-text: #f5f3ff;
      --splash-muted: rgba(216, 180, 254, 0.8);
      --splash-fill: #8b5cf6;
    }
    html[data-theme="crimson"] {
      --splash-bg: #0c0405;
      --splash-card: rgba(12, 4, 5, 0.96);
      --splash-border: rgba(220, 38, 38, 0.22);
      --splash-text: #fef2f2;
      --splash-muted: rgba(252, 165, 165, 0.8);
      --splash-fill: #dc2626;
    }
    html[data-theme="terminal"] {
      --splash-bg: #050c07;
      --splash-card: rgba(5, 12, 7, 0.97);
      --splash-border: rgba(0, 255, 170, 0.18);
      --splash-text: #e9ffee;
      --splash-muted: rgba(138, 245, 192, 0.8);
      --splash-fill: #16a34a;
    }
    html[data-theme="midnight"] {
      --splash-bg: #0a0e1a;
      --splash-card: rgba(10, 14, 26, 0.97);
      --splash-border: rgba(96, 165, 250, 0.18);
      --splash-text: #e8edf5;
      --splash-muted: rgba(148, 163, 196, 0.85);
      --splash-fill: #38bdf8;
    }
    html[data-theme="bumblebee"] {
      --splash-bg: #0c0b08;
      --splash-card: rgba(12, 11, 8, 0.97);
      --splash-border: rgba(250, 204, 21, 0.22);
      --splash-text: #fefce8;
      --splash-muted: rgba(202, 138, 4, 0.9);
      --splash-fill: #facc15;
    }
    html[data-theme="monochrome"] {
      --splash-bg: #0a0a0a;
      --splash-card: rgba(10, 10, 10, 0.97);
      --splash-border: rgba(255, 255, 255, 0.1);
      --splash-text: #f5f5f5;
      --splash-muted: rgba(163, 163, 163, 0.9);
      --splash-fill: #e5e5e5;
    }
    html[data-theme="rose"] {
      --splash-bg: #1a1216;
      --splash-card: rgba(26, 18, 22, 0.97);
      --splash-border: rgba(244, 114, 182, 0.18);
      --splash-text: #fdf2f8;
      --splash-muted: rgba(249, 168, 212, 0.85);
      --splash-fill: #f472b6;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--splash-bg);
      color: var(--splash-text);
      font-family: 'Segoe UI', -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
    }

    .splash-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 36px 48px;
      background: var(--splash-card);
      border: 1px solid var(--splash-border);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    .mark {
      width: 150px;
      height: 150px;
      transform: scale(4);
      margin-top: 100px;
      border-radius: 0px;
      object-fit: contain;
      animation: pulse 1.8s ease-in-out infinite;
    }

    .wordmark {
      height: 128px;
      width: auto;
      opacity: 0.97;
      margin-top: 20px;
    }

    .loading-bar {
      width: 240px;
      height: 4px;
      border-radius: 2px;
      background: var(--splash-bar);
      overflow: hidden;
      margin-top: -62px;
    }

    .loading-bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 2px;
      background: var(--splash-fill);
      transition: width 0.35s ease;
    }

    .loading-label {
      font-size: 12px;
      color: var(--splash-muted);
      margin-top: -20px;
      text-align: center;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(2.75);
      }

      50% {
        opacity: 0.75;
        transform: scale(2.5);
      }
    }
  </style>
</head>

<body>
  <div class="splash-card">
    <img class="mark" src="../../../assets/toast-icon.png" alt="Soterios" />
    <img class="wordmark" src="../../../assets/toast-wordmark.png" alt="Soterios" />
    <div class="loading-bar">
      <div class="loading-bar-fill" id="progressFill"></div>
    </div>
    <div class="loading-label" id="progressLabel">Starting Soterios...</div>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search || '');
      var theme = (params.get('theme') || 'dark').toLowerCase();
      document.documentElement.setAttribute('data-theme', theme);

      var fill = document.getElementById('progressFill');
      var label = document.getElementById('progressLabel');

      if (window.api && window.api.on) {
        window.api.on('splash:progress', function (data) {
          if (data.pct !== undefined && fill) {
            fill.style.width = Math.min(100, Math.max(0, data.pct)) + '%';
          }
          if (data.label && label) {
            label.textContent = data.label;
          }
        });
      }
    })();
  </script>
</body>

</html>
