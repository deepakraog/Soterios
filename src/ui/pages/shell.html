<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self';" />
  <title>Soterios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css" />
</head>

<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo" style="background:transparent; box-shadow:none;">
          <img src="../../../assets/icon.png" alt="Soterios" style="width:100px;height:100px;object-fit:contain;" />
        </div>
        <img src="../../../assets/soteriosTextLogo.png" alt="Soterios"
          style="height: 80px; object-fit:contain; margin-left:-15px;" />
      </div>

      <nav class="nav">
        <div class="nav-group-label">Protection</div>
        <div class="nav-item active" data-page="dashboard">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg>
          Dashboard
        </div>
        <div class="nav-item" data-page="scanner">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          Virus Scan
        </div>
        <div class="nav-item" data-page="quarantine">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="4" rx="1" />
            <path d="M5 8v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8M10 13h4" />
          </svg>
          Quarantine
        </div>

        <div class="nav-group-label">Analysis</div>
        <div class="nav-item" data-page="processes">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2" />
            <line x1="8" y1="21" x2="16" y2="21" />
            <line x1="12" y1="17" x2="12" y2="21" />
          </svg>
          Process Inspector
        </div>
        <div class="nav-item" data-page="audit">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
            <path d="M9 12l2 2 4-4" />
          </svg>
          Windows Audit
        </div>
        <div class="nav-item" data-page="firewall">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">

            <rect x="3" y="3" width="18" height="12" rx="1" />
            <line x1="3" y1="7" x2="21" y2="7" />
            <line x1="3" y1="11" x2="21" y2="11" />
            <line x1="9" y1="3" x2="9" y2="7" />
            <line x1="15" y1="7" x2="15" y2="11" />
            <line x1="9" y1="11" x2="9" y2="15" />

          </svg>

          Firewall Management
        </div>
        <div class="nav-item" data-page="network">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10" />
            <line x1="2" y1="12" x2="22" y2="12" />
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
          </svg>
          Network Monitor
        </div>

        <div class="nav-group-label">Utilities</div>
        <div class="nav-item" data-page="passwords">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
          Passwords
        </div>
        <div class="nav-item" data-page="tools">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14.7 6.3a4 4 0 0 1-5.4 5.4L4 17l3 3 5.3-5.3a4 4 0 0 1 5.4-5.4l-3-3Z" />
          </svg>
          Tools & Maintenance
        </div>
        <div class="nav-item" data-page="reports">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <path d="M14 2v6h6" />
            <path d="M8 13h8M8 17h8M8 9h2" />
          </svg>
          Reports
        </div>

        <div class="nav-group-label">App</div>
        <div class="nav-item" data-page="settings">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1Z" />
          </svg>
          Settings
        </div>
      </nav>
      <div id="scanIndicator" class="scan-indicator" style="display:none;">
        <div class="scan-indicator-header">
          <span class="scan-indicator-dot"></span>
          <span class="scan-indicator-label">Scanning…</span>
          <span class="scan-indicator-pct" id="scanIndicatorPct">0%</span>
        </div>
        <div class="scan-indicator-track">
          <div class="scan-indicator-fill" id="scanIndicatorFill" style="width:0%"></div>
        </div>
        <div class="scan-indicator-msg" id="scanIndicatorMsg"></div>
      </div>
      <div class="sidebar-footer">Engine: ClamAV</div>
    </aside>
    <main class="main compact" id="mainContent">
      <!-- Pages are injected here by router.js -->
    </main>
  </div>
  <script src="../js/state.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/pages/dashboard.js"></script>
  <script src="../js/pages/scanner.js"></script>
  <script src="../js/pages/quarantine.js"></script>
  <script src="../js/pages/processes.js"></script>
  <script src="../js/pages/audit.js"></script>
  <script src="../js/pages/firewall.js"></script>
  <script src="../js/pages/network.js"></script>
  <script src="../js/pages/passwords.js"></script>
  <script src="../js/pages/tools.js"></script>
  <script src="../js/pages/reports.js"></script>
  <script src="../js/pages/settings.js"></script>
  <script src="../js/scanIndicator.js"></script>
  <script src="../js/router.js"></script>
</body>

</html>
